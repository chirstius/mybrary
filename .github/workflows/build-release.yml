name: Build & Release APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "google_books_api_key=${{ secrets.GOOGLE_BOOKS_API_KEY }}" > local.properties

      - name: Build debug APK
        run: |
          sed -i 's/\r$//' gradlew gradle.properties gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/mybrary.apk

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mybrary (latest build)
          body: |
            Latest debug build from `master`.

            Install: download `mybrary.apk` below and sideload on your Android device.
          prerelease: true
          make_latest: true
          files: app/build/outputs/apk/debug/mybrary.apk
